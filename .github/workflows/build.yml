name: Build and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      minecraft: ${{ steps.resolve.outputs.minecraft }}
      changed: ${{ steps.cache-check.outputs.cache-hit != 'true' }}
      hash: ${{ steps.resolve.outputs.hash }}
    steps:
      - uses: actions/checkout@v6

      - id: resolve
        run: |
          source scripts/version-resolve.sh

          HASH=$(echo "${MINECRAFT_VERSION}" | sha256sum | cut -d' ' -f1)

          echo "Latest Minecraft: ${MINECRAFT_VERSION}"
          echo "Version hash:     ${HASH}"

          echo "minecraft=${MINECRAFT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"

          mkdir -p /tmp/version-cache
          echo "${MINECRAFT_VERSION}" > /tmp/version-cache/stamp

      - uses: actions/cache/restore@v5
        id: cache-check
        with:
          path: /tmp/version-cache
          key: minecraft-version-${{ steps.resolve.outputs.hash }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          format: tty
          check_together: 'yes'

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  test:
    needs: check-versions
    if: needs.check-versions.outputs.changed == 'true' || github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run unit tests
        run: bash tests/test_entrypoint.sh && bash tests/test_providers.sh

  build:
    needs: [check-versions, test]
    if: |
      always() &&
      needs.check-versions.result == 'success' &&
      (needs.check-versions.outputs.changed == 'true' || github.event_name != 'schedule') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ needs.check-versions.outputs.minecraft }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MINECRAFT_VERSION=${{ needs.check-versions.outputs.minecraft }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create cache stamp
        if: github.event_name == 'schedule' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p /tmp/version-cache
          echo "${{ needs.check-versions.outputs.minecraft }}" > /tmp/version-cache/stamp

      - name: Save version cache
        if: github.event_name == 'schedule' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: /tmp/version-cache
          key: minecraft-version-${{ needs.check-versions.outputs.hash }}
